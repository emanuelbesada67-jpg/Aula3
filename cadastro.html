<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>formulario de cadastro</title>
</head>
<body class="container">
    <h1>cadastro de viajantes</h1>
    <form action="#" method="post" enctype="multipart/form-data">
        <!--DADOS PESSOAIS-->
        <fieldset class="form-control mb-3">
            <legend>dados pessoais</legend>
            <label for="nome">nome completo</label>
            <input type="text" name="nome" id="nome"
            placeholder="digite seu nome" title="digite seu nome completo sem abreviações"
            class="form-control"required>
              <label for="email">E-mail</label>
              <input type="email" name="email" id="email"
              placeholder="exemplo@email.com" class="form-control" required>
              <label for="idade">idade</label>
              <input type="number" name="idade" id="idade"
              class="form-control" required>
        </fieldset>
        <fieldset class="form-control">
        <legend>contato</legend>
        <label for="telefone">telefone</label>
        <input type="tel" name="telefone" id="telefone">
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email"
        placeholder="exemplo@email.com" class="form-control" required>
        <input class="form-control" placeholder="(21) 99999-9999" pattern="^(\d{2}\)\d{5}-\d{4}$" title="formato:(21)99999-9999">
        </fieldset class="form-control mb-3">
        <fieldset class="form-control mb-3">
            <legend>Preferências de viagem</legend>
            <label for="destino">Destino</label>
            <input type="text" name="destino" id="destino" class="form-control" placeholder="Ex: Paris, NY, Istambul">
            <label for="tipo">Tipo</label>
            <select name="tipo" id="tipo" class="form-control">
                <option value="praia">Praia</option>
                <option value="aventura">aventura</option>
                <option value="romantico">romantico</option>
                <option value="cultural">cultural</option>
            </select>
            <label for="dataida">data de ida</label>
            <ihput type="date" name="dataida" id="dataida"
            class="form-control">
            <label for="datavolta">data de volta</label>
            <ihput type="date" name="datavolta" id="datavolta"
            class="form-control">
            <p>deseja receber promoções de viagens?</p>
            <input type="radio" name="promo" id="sim"
            value="sim"><label for="sim">sim</label>
            <input type="radio" name="promo" id="não"
            value="não"><label for="não">não</label>
        </fieldset>
        <fieldset class="form-control mb-3">
            <legend>outros</legend>
            <label for="passaporte">upload de passaporte (opcional)</label>
            <input type="file" name="passaporte" id="passaporte" class="form-control">
            <label for="cor">Cor favorita para tema da viagem</label>
            <input type="color" name="cor" id="cor">
            <label for="hobbies">hobbies</label>
            <input type="checkbox" name="hobbies1" id="revista">
            <label for="revista">revista</label>
            <input type="checkbox" name="hobbies2" id="jornal">
            <label for="jornal">Jornal</label>
        </fieldset>
            <button class="btn btn-info" type="submit">cadastrar</button>
            <button class="btn btn-danger" type="reset">limpar</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"rel="stylesheet"
     integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" cross origin="anonymous">
     <script src="js/script.js">
</body>
</html>
